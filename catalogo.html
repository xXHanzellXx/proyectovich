<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSystem - Gestión de Productos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --primary-glow: #38bdf8;
            --text-muted: #94a3b8;
            --border-glow: #334155;
            --input-bg: #0f172a;
            --success: #22c55e;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Encabezado Principal */
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 20px;
        }

        .header-flex h2 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botones de Navegación superior */
        .btn-nav, .btn-logout {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glow);
            color: #f8fafc;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 10px;
        }

        .btn-nav:hover {
            border-color: var(--primary-glow);
            background: rgba(56, 189, 248, 0.1);
        }

        .btn-logout:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        /* Tarjeta de Panel Admin */
        .card {
            background: var(--surface-dark);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            margin: 0 0 5px 0;
            font-size: 1.3rem;
            color: #f1f5f9;
        }

        .text-muted {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Formulario Alineado */
        .form-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-group input, .form-group select {
            background: var(--input-bg);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            color: #f8fafc;
            outline: none;
            flex: 1;
            min-width: 180px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
        }

        /* Botones de Acción */
        .btn-primary {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
        }

        /* Diseño de Tablas Modernas */
        .table-wrap {
            background: var(--surface-dark);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-muted);
            font-weight: 600;
            padding: 16px 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-glow);
        }

        td {
            padding: 16px 20px;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            font-size: 1rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Modales Avanzados */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { 
            display: flex; 
        }

        .modal-content {
            background: var(--surface-dark);
            border: 1px solid var(--border-glow);
            padding: 35px 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: #f8fafc;
        }

        .modal-content h2 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #f1f5f9;
        }

        .close {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 28px; cursor: pointer;
            background: none; border: none; color: var(--text-muted);
            transition: color 0.2s;
        }
        
        .close:hover { 
            color: #ffffff; 
        }

        /* Botón Flotante de Ayuda (?) */
        #btnManual {
            position: fixed;
            bottom: 25px;
            right: 95px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #0284c7;
            color: white;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            z-index: 999;
            transition: all 0.3s ease;
        }

        #btnManual:hover {
            background: #38bdf8;
            transform: scale(1.05);
        }

        /* Botón Flotante del Carrito */
        .btn-carrito-flotante {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--success);
            color: white;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 150, 0.4);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-carrito-flotante:hover {
            transform: scale(1.05);
            background: #4ade80;
        }

        #contadorCarrito {
            background: #ffffff;
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            position: absolute;
            top: 8px; right: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>📦 ShopSystem Inventario</h2>
        <div id="authButtons">
            <button id="btnLoginNav" class="btn-nav" onclick="window.location.href='login.html'">Iniciar Sesión</button>
            <button id="btnRegistroNav" class="btn-nav" onclick="window.location.href='registro.html'">Registrarse</button>
            <button id="btnLogut" class="btn-logout" onclick="logout()" style="display:none;">Cerrar Sesión</button>
        </div>
    </div>

    <div id="seccionAdmin" style="display:none;">
        <div class="card">
            <h3>🛠️ Panel de Administración</h3>
            <p class="text-muted">Agregar o editar productos en la base de datos.</p>
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Nombre del producto">
                <input type="number" id="precio" placeholder="Precio (₡)">
                
                <select id="categoria">
                    <option value="General">General</option>
                    <option value="Electrónica">Electrónica</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Alimentos">Alimentos</option>
                </select>

                <button id="btnPrincipal" class="btn-primary" onclick="agregarProducto()">Añadir Producto</button>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Producto / Categoría</th>
                    <th>Precio</th>
                    <th>Acciones / Cantidad</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>
</div>

<div id="modalManual" class="modal">
    <div class="modal-content">
        <button class="close" onclick="cerrarModal('modalManual')">&times;</button>
        <h2 id="manualTitulo" style="color: var(--primary-glow);"></h2>
        <hr style="border: none; height: 1px; background: var(--border-glow); margin: 15px 0;">
        <div id="manualCuerpo" style="line-height: 1.6; color: #cbd5e1;"></div>
    </div>
</div>

<div id="modalCarrito" class="modal">
    <div class="modal-content">
        <button class="close" onclick="cerrarModal('modalCarrito')">&times;</button>
        <h2>🛒 Tu Carrito de Compras</h2>
        <hr style="border: none; height: 1px; background: var(--border-glow); margin: 15px 0;">
        <div id="listaCarrito">
            <p class="text-muted">El carrito está vacío.</p>
        </div>
        <div class="carrito-footer" style="margin-top: 25px; border-top: 1px solid var(--border-glow); padding-top: 20px;">
            <div class="carrito-total" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 1.1rem; font-weight: 600; color: var(--text-muted);">Total General:</span>
                <b id="totalCarrito" style="font-size: 1.5rem; color: var(--success);">₡0</b>
            </div>
            <button class="btn-primary" style="width: 100%; background: var(--success); padding: 14px; box-shadow: 0 4px 15px rgba(34,197,94,0.2);" onclick="finalizarCompra()">
                Finalizar Compra
            </button>
        </div>
    </div>
</div>

<button id="btnManual" title="Ayuda" onclick="abrirModal('modalManual')">?</button>

<button id="btnCarritoFlotante" class="btn-carrito-flotante" onclick="abrirModal('modalCarrito')">
    🛒 <span id="contadorCarrito">0</span>
</button>

<script src="app.js?v=1.3"></script>
</body>
</html>
