<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ShopSystem - Gestión de Productos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>📦 ShopSystem Inventario</h2>
        <div id="authButtons">
            <!-- Botones de Navegación (Visibles según sesión) -->
            <button id="btnLoginNav" class="btn-nav" onclick="window.location.href='login.html'">Iniciar Sesión</button>
            <button id="btnRegistroNav" class="btn-nav" onclick="window.location.href='registro.html'">Registrarse</button>
            <button id="btnLogut" class="btn-logout" onclick="logout()" style="display:none;">Cerrar Sesión</button>
        </div>
    </div>

    <!-- SECCIÓN ADMIN ACTUALIZADA CON CATEGORÍAS -->
    <div id="seccionAdmin" style="display:none;">
        <div class="card">
            <h3>🛠️ Panel de Administración</h3>
            <p class="text-sm text-muted mb-1">Agregar o editar productos en la base de datos.</p>
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Nombre del producto">
                <input type="number" id="precio" placeholder="Precio (₡)">
                
                <!-- IMPORTANTE: Selector de categorías añadido -->
                <select id="categoria">
                    <option value="General">General</option>
                    <option value="Electrónica">Electrónica</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Alimentos">Alimentos</option>
                </select>

                <button id="btnPrincipal" class="btn-primary" onclick="agregarProducto()">Añadir Producto</button>
            </div>
        </div>
    </div>

    <!-- TABLA DE PRODUCTOS -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Producto / Categoría</th> <!-- Cabecera actualizada -->
                    <th>Precio</th>
                    <th>Acciones / Cantidad</th> <!-- Cabecera actualizada -->
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <!-- JS inyecta las filas aquí -->
            </tbody>
        </table>
    </div>
</div>

<!-- MODAL MANUAL (Centrado) -->
<div id="modalManual" class="modal">
    <div class="modal-content">
        <button class="close" onclick="cerrarModal('modalManual')">&times;</button>
        <h2 id="manualTitulo" class="manual-titulo"></h2>
        <hr class="mb-2" style="opacity: 0.2;">
        <div id="manualCuerpo" class="manual-cuerpo"></div>
    </div>
</div>

<!-- MODAL CARRITO (Centrado) -->
<div id="modalCarrito" class="modal">
    <div class="modal-content">
        <button class="close" onclick="cerrarModal('modalCarrito')">&times;</button>
        <h2>🛒 Tu Carrito de Compras</h2>
        <hr class="mb-2" style="opacity: 0.2;">
        <div id="listaCarrito">
            <p class="text-muted">El carrito está vacío.</p>
        </div>
        <div class="carrito-footer" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
            <div class="carrito-total" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-size: 1.2rem; font-weight: bold;">Total:</span>
                <b id="totalCarrito" style="font-size: 1.4rem; color: var(--success);">₡0</b>
            </div>
            <button class="btn-primary" style="width: 100%; background: var(--success); padding: 12px;" onclick="finalizarCompra()">Finalizar Compra</button>
        </div>
    </div>
</div>

<!-- Botones Flotantes -->
<button id="btnManual" title="Ayuda">?</button>

<button id="btnCarritoFlotante" class="btn-carrito-flotante" onclick="abrirModal('modalCarrito')">
    🛒 <span id="contadorCarrito">0</span>
</button>

<script src="app.js"></script>
</body>
</html>
